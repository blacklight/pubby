<style>
.ap-interactions, .ap-interaction {
  --color-bg: var(--color-bg-interactions, #f8f8f8);
  --color-fg: var(--color-fg-interactions, #3a3a3a);
  --color-fg-secondary: var(--color-fg-interactions-secondary, #555);
  --color-fg-tertiary: var(--color-fg-interactions-tertiary, #999);
  --color-border: var(--color-interactions-border, #ccc);
}

@media (prefers-color-scheme: dark) {
  .ap-interactions, .ap-interaction {
    --color-bg: var(--color-bg-interactions, #202020);
    --color-fg: var(--color-fg-interactions, #ccc);
    --color-fg-secondary: var(--color-fg-interactions-secondary, #aaa);
    --color-fg-tertiary: var(--color-fg-interactions-tertiary, #666);
    --color-border: var(--color-interactions-border, #666);
  }
}

.ap-interactions {
  margin-top: 1.5em;
  border-top: 3px solid var(--color-border);
}

.ap-interaction {
  margin-bottom: 0.5em;
  padding: 1em;
  border: 1px solid var(--color-border);
  border-radius: 0.6em;
  background: var(--color-bg);
  color: var(--color-fg);
}

.ap-interaction .ap-interaction-author {
  display: inline-flex;
  align-items: center;
  gap: 0.5em;
}

.ap-interaction .ap-interaction-author-photo {
  width: 35px;
  height: 35px;
  border-radius: 999px;
  object-fit: cover;
  border: 1px solid var(--color-border);
}

.ap-interaction .ap-interaction-author-name {
  color: var(--color-fg-secondary);
}

.ap-interaction .ap-interaction-author-fqn {
  display: inline-flex;
  align-items: center;
  margin-top: -0.1em;
}

.ap-interaction .ap-interaction-author-fqn a {
  font-size: 0.75em;
  color: var(--color-fg-tertiary);
  margin-left: 0.25em;
}

.ap-interaction .ap-interaction-body {
  margin-top: 0.5em;
}

.ap-interaction .ap-interaction-content {
  line-height: 1.45em;
}

.ap-interaction .ap-interaction-content.ap-interaction-collapsible {
  max-height: 8em;
  overflow: hidden;
  position: relative;
  transition: max-height 0.35s cubic-bezier(0, 1, 0, 1);
}

.ap-interaction .ap-interaction-content.ap-interaction-collapsible::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2em;
  background: linear-gradient(to bottom, transparent, var(--color-bg));
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.ap-interaction:has(.ap-interaction-toggle:checked) .ap-interaction-content.ap-interaction-collapsible {
  max-height: 1000em;
  transition: max-height 0.35s ease-in;
}

.ap-interaction:has(.ap-interaction-toggle:checked) .ap-interaction-content.ap-interaction-collapsible::after {
  opacity: 0;
}

.ap-interaction .ap-interaction-toggle {
  display: none;
}

.ap-interaction .ap-interaction-expand {
  display: block;
  cursor: pointer;
  text-align: center;
  font-size: 0.75em;
  color: var(--color-fg-tertiary);
  padding: 0.25em 0;
  user-select: none;
}

.ap-interaction .ap-interaction-expand::after {
  content: 'show more \25BE';
}

.ap-interaction:has(.ap-interaction-toggle:checked) .ap-interaction-expand::after {
  content: 'show less \25B4';
}

.ap-interaction .ap-interaction-label {
  color: var(--color-fg-tertiary);
  font-size: 0.9em;
}

.ap-interaction .ap-interaction-date {
  font-size: 0.6em;
  color: var(--color-fg-tertiary);
}

.ap-interaction .ap-interaction-footer {
  display: flex;
  align-items: center;
  gap: 1em;
  margin-top: 0.5em;
}

.ap-interaction .ap-interaction-source-link {
  font-size: 0.6em;
  color: var(--color-fg-tertiary);
  text-decoration: none;
}

.ap-interaction .ap-interaction-source-link:hover {
  text-decoration: underline;
}

.ap-interactions-summary {
  display: flex;
  gap: 1.25em;
  font-size: 0.85em;
  color: var(--color-fg-tertiary);
  margin-bottom: 1em;
}

.ap-interactions-summary span {
  display: inline-flex;
  align-items: center;
  gap: 0.3em;
}

.ap-interactions h2 {
  color: var(--color-fg-secondary);
  margin-top: 0.5em;
  margin-bottom: 1em;
  padding-top: 0.5em;
  font-weight: normal;
}
</style>

{% if interactions is defined and interactions|length > 0 %}
<div class="ap-interactions">
  <h2>🌐 &nbsp; <a href="https://activitypub.rocks/" target="_blank">ActivityPub</a></h2>
  {% if counts is defined %}
  <div class="ap-interactions-summary">
    <span>⭐ {{ counts.likes }}</span>
    <span>🔁 {{ counts.boosts }}</span>
    <span>💬 {{ counts.replies }}</span>
    <span>🗣️ {{ counts.quotes }}</span>
    <span>📣 {{ counts.mentions }}</span>
  </div>
  {% endif %}
  {% for html in interactions %}
    {{ html }}
  {% endfor %}
</div>
{% endif %}
